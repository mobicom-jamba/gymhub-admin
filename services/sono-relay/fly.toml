# Sono (rico.mn) static-egress relay.
# rico.mn whitelists this app's dedicated IPv4; our Vercel functions call
# SONO_BASE_URL=https://gymhub-sono-relay.fly.dev which forwards to rico.mn.
app = "gymhub-sono-relay"
primary_region = "nrt"

[build]

# Uncomment to enable the optional shared-secret gate (also set it in Vercel
# and send it from proxyFetch as the x-relay-secret header).
# [env]
#   RELAY_SECRET = "change-me"

[http_service]
  internal_port = 80
  force_https = true
  # Keep one machine always on so the egress IP stays warm and payment
  # calls never hit a cold start. Set auto_stop_machines = "stop" and
  # min_machines_running = 0 to trim ~$2/mo if cold starts are acceptable.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
